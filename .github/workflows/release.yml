name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build universal binary
        run: swift build -c release --arch arm64 --arch x86_64 || true

      - name: Verify and package binary
        run: |
          BIN_DIR=$(swift build -c release --arch arm64 --arch x86_64 --show-bin-path)
          BINARY="$BIN_DIR/grantiva"
          BUNDLE="$BIN_DIR/grantiva_GrantivaCore.bundle"
          test -f "$BINARY" || { echo "Binary not found at $BINARY"; exit 1; }
          test -d "$BUNDLE" || { echo "Resource bundle not found at $BUNDLE"; exit 1; }
          strip "$BINARY"
          tar -czf "grantiva-${{ github.ref_name }}-macos.tar.gz" -C "$BIN_DIR" grantiva grantiva_GrantivaCore.bundle

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            grantiva-${{ github.ref_name }}-macos.tar.gz
          generate_release_notes: true
