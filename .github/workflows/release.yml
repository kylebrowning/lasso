name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build universal binary
        run: swift build -c release --arch arm64 --arch x86_64 || true

      - name: Verify and package binary
        run: |
          BIN_DIR=$(swift build -c release --arch arm64 --arch x86_64 --show-bin-path)
          BINARY="$BIN_DIR/grantiva"
          BUNDLE="$BIN_DIR/grantiva_GrantivaCore.bundle"
          test -f "$BINARY" || { echo "Binary not found at $BINARY"; exit 1; }
          test -d "$BUNDLE" || { echo "Resource bundle not found at $BUNDLE"; exit 1; }
          strip "$BINARY"
          tar -czf "grantiva-${{ github.ref_name }}-macos.tar.gz" -C "$BIN_DIR" grantiva grantiva_GrantivaCore.bundle

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            grantiva-${{ github.ref_name }}-macos.tar.gz
          generate_release_notes: true

      - name: Update Homebrew formula
        run: |
          SHA=$(shasum -a 256 "grantiva-${{ github.ref_name }}-macos.tar.gz" | awk '{print $1}')
          VERSION="${{ github.ref_name }}"

          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/grantiva/homebrew-tap.git /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          cat > Formula/grantiva.rb << FORMULA
          class Grantiva < Formula
            desc "The CLI for iOS developers — visual regression testing, feature flags, and more"
            homepage "https://grantiva.io"
            url "https://github.com/grantiva/cli/releases/download/${VERSION}/grantiva-${VERSION}-macos.tar.gz"
            sha256 "${SHA}"
            version "${VERSION}"
            license "MIT"

            depends_on :macos

            def install
              libexec.install "grantiva", "grantiva_GrantivaCore.bundle"
              bin.install_symlink libexec/"grantiva"
            end

            test do
              assert_match "USAGE: grantiva", shell_output("#{bin}/grantiva --help 2>&1")
            end
          end
          FORMULA

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/grantiva.rb
          git commit -m "Update grantiva to ${VERSION}"
          git push
