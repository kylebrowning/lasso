name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build universal binary
        run: swift build -c release --arch arm64 --arch x86_64 || true

      - name: Verify and package binary
        run: |
          BINARY=$(swift build -c release --arch arm64 --arch x86_64 --show-bin-path)/lasso
          test -f "$BINARY" || { echo "Binary not found at $BINARY"; exit 1; }
          strip "$BINARY"
          tar -czf "lasso-${{ github.ref_name }}-macos.tar.gz" -C "$(dirname "$BINARY")" lasso

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: lasso-${{ github.ref_name }}-macos.tar.gz
          generate_release_notes: true
