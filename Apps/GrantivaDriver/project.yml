name: GrantivaDriver
options:
  bundleIdPrefix: io.grantiva
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
targets:
  GrantivaDriver:
    type: application
    platform: iOS
    sources: [GrantivaDriver]
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: io.grantiva.driver
  GrantivaDriverUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [GrantivaDriverUITests]
    dependencies:
      - target: GrantivaDriver
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: io.grantiva.driver.uitests
