name: LassoDriver
options:
  bundleIdPrefix: tools.lasso
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
targets:
  LassoDriver:
    type: application
    platform: iOS
    sources: [LassoDriver]
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: tools.lasso.driver
  LassoDriverUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [LassoDriverUITests]
    dependencies:
      - target: LassoDriver
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: tools.lasso.driver.uitests
